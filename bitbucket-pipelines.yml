pipelines:
  branches:
    main:
      - step:
          name: Build and Deploy to Cloudflare Pages
          image: node:22
          caches:
            - node
          script:
            - npm install --legacy-peer-deps
            - npm run build
            - # Cloudflare Pages へデプロイ
            - # プロジェクト名は Cloudflare 側と一致させてください
            - npx wrangler pages deploy dist/client --project-name vigorous-venus --commit-dirty=true
